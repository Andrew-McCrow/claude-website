<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book a Call — Octopus AI</title>
    <meta
      name="description"
      content="Book a free strategy call with Octopus AI. Tell us about your workflow and we'll show you exactly where automation can save you time and money."
    />
    <link rel="canonical" href="https://asktheoctopus.com/contact.html" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://asktheoctopus.com/contact.html" />
    <meta property="og:title" content="Book a Call — Octopus AI" />
    <meta
      property="og:description"
      content="Book a free strategy call with Octopus AI. Tell us about your workflow and we'll show you exactly where automation can save you time and money."
    />
    <meta
      property="og:image"
      content="https://asktheoctopus.com/public/Logos/Logo - Primary Accent.png"
    />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Book a Call — Octopus AI" />
    <meta
      name="twitter:description"
      content="Book a free strategy call with Octopus AI."
    />
    <link rel="icon" href="public/Logos/Logo - Primary Accent.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        try {
          if (
            window.sessionStorage.getItem("octopus_page_transition") === "1"
          ) {
            document.documentElement.classList.add("transition-pending");
          }
        } catch (error) {}
      })();
    </script>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <canvas id="scene" aria-hidden="true"></canvas>
    <div id="nav-placeholder"></div>

    <main class="contact-main">
      <section class="section contact-section">
        <div class="container">
          <div class="contact-shell">
            <div class="section-intro max-w-500">
              <span class="eyebrow">Book A Call</span>
              <h1>Let's talk!</h1>
            </div>

            <form
              class="contact-form"
              action="https://formspree.io/f/xdawdblk"
              method="POST"
            >
              <input
                type="text"
                name="_honey"
                class="contact-honeypot"
                tabindex="-1"
                autocomplete="off"
              />

              <div class="contact-row">
                <div class="form-field">
                  <label for="full-name">Full Name</label>
                  <input
                    id="full-name"
                    name="name"
                    type="text"
                    placeholder="Jane Smith"
                    required
                  />
                </div>
                <div class="form-field">
                  <label for="email">Work Email</label>
                  <input
                    id="email"
                    name="email"
                    type="email"
                    placeholder="jane@company.com"
                    required
                  />
                </div>
              </div>

              <div class="form-field">
                <label for="company">Company</label>
                <input
                  id="company"
                  name="company"
                  type="text"
                  placeholder="Your company"
                />
              </div>

              <div class="form-field">
                <label for="message">What do you want help with?</label>
                <textarea
                  id="message"
                  name="message"
                  placeholder="Share your current workflow and what you want to improve."
                  required
                ></textarea>
              </div>

              <button
                type="submit"
                class="btn btn-primary btn-lg contact-submit"
              >
                Submit
              </button>
            </form>
          </div>

          <div id="footer-placeholder"></div>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="assets/js/components.js"></script>
    <script src="assets/js/menu.js"></script>
    <script src="assets/js/page-transition.js"></script>
    <script src="assets/js/contact-form.js"></script>
    <script src="assets/js/scene-bg.js"></script>
  </body>
</html>
