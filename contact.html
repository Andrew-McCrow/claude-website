<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact - Octopus AI</title>
    <link rel="icon" href="public/logos/Logo - Primary Accent.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        try {
          if (
            window.sessionStorage.getItem("octopus_page_transition") === "1"
          ) {
            document.documentElement.classList.add("transition-pending");
          }
        } catch (error) {}
      })();
    </script>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <nav>
      <a href="index.html#top" class="nav-logo">
        <img src="public/logos/Logo - Primary Accent.png" alt="Octopus AI" />
        <span class="nav-logo-name">Octopus AI</span>
      </a>
      <ul class="nav-links">
        <li><a href="index.html#what">What</a></li>
        <li><a href="index.html#how">How</a></li>
        <li><a href="index.html#results">Results</a></li>
      </ul>
      <div class="nav-actions">
        <a href="contact.html" class="btn btn-primary nav-cta">Book Call</a>
        <button
          class="menu-toggle"
          type="button"
          aria-label="Toggle navigation"
          aria-expanded="false"
          aria-controls="mobile-menu"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </nav>

    <div id="mobile-menu" class="mobile-menu" hidden>
      <div class="mobile-menu-inner">
        <a href="index.html#what">What</a>
        <a href="index.html#how">How</a>
        <a href="index.html#results">Results</a>
        <a href="contact.html" class="btn btn-primary mobile-menu-cta"
          >Book Call</a
        >
      </div>
    </div>

    <main class="contact-main">
      <section class="section contact-section">
        <div class="container">
          <div class="contact-shell">
            <div class="section-intro max-w-500">
              <span class="eyebrow">Book A Call</span>
              <h2>Let's talk!</h2>
              <p>Share a few details and we will get back to you soon.</p>
            </div>

            <form
              class="contact-form"
              action="mailto:hello@asktheoctopus.com"
              method="POST"
              enctype="text/plain"
            >
              <input
                type="text"
                name="_honey"
                class="contact-honeypot"
                tabindex="-1"
                autocomplete="off"
              />

              <div class="contact-row">
                <div class="form-field">
                  <label for="full-name">Full Name</label>
                  <input
                    id="full-name"
                    name="name"
                    type="text"
                    placeholder="Jane Smith"
                    required
                  />
                </div>
                <div class="form-field">
                  <label for="email">Work Email</label>
                  <input
                    id="email"
                    name="email"
                    type="email"
                    placeholder="jane@company.com"
                    required
                  />
                </div>
              </div>

              <div class="form-field">
                <label for="company">Company</label>
                <input
                  id="company"
                  name="company"
                  type="text"
                  placeholder="Your company"
                />
              </div>

              <div class="form-field">
                <label for="message">What do you want help with?</label>
                <textarea
                  id="message"
                  name="message"
                  placeholder="Share your current workflow and what you want to improve."
                  required
                ></textarea>
              </div>

              <button
                type="submit"
                class="btn btn-primary btn-lg contact-submit"
              >
                Submit
              </button>
            </form>
          </div>

          <div class="footer">
            <div class="footer-brand">
              <img
                src="public/logos/Logo - Primary Accent.png"
                alt="Octopus AI"
              />
              <span>Octopus AI</span>
            </div>
            <span class="footer-meta"
              >&copy; 2026 Octopus AI &middot; asktheoctopus.com</span
            >
            <div class="footer-links">
              <a href="privacy-policy.html">Privacy</a>
              <a href="terms-of-use.html">Terms</a>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="assets/js/menu.js"></script>
    <script src="assets/js/page-transition.js"></script>
    <script src="assets/js/contact-form.js"></script>
  </body>
</html>
