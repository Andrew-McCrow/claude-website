<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank You — Octopus AI</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" href="../../assets/images/logo-primary.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        try {
          if (
            window.sessionStorage.getItem("octopus_page_transition") === "1"
          ) {
            document.documentElement.classList.add("transition-pending");
          }
        } catch (error) {}
      })();
    </script>
    <link rel="stylesheet" href="../../assets/css/styles.css" />
  </head>
  <body>
    <canvas id="scene" aria-hidden="true"></canvas>
    <div id="nav-placeholder"></div>

    <main class="contact-main">
      <section class="section contact-section">
        <div class="container">
          <div class="contact-shell">
            <div class="section-intro max-w-500">
              <span class="eyebrow">Thank You</span>
              <h1>We'll be in touch!</h1>
            </div>

            <div class="hero-actions success-actions">
              <a href="index.html" class="btn btn-primary btn-lg"
                >Back To Home</a
              >
            </div>
          </div>

          <div id="footer-placeholder"></div>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="../../assets/js/components.js"></script>
    <script src="../../assets/js/menu.js"></script>
    <script src="../../assets/js/page-transition.js"></script>
    <script src="../../assets/js/scene-bg.js"></script>
  </body>
</html>
